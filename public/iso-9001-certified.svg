<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066b3"/>
      <stop offset="100%" style="stop-color:#004080"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="122" cy="292" rx="80" ry="6" fill="rgba(0,0,0,0.08)"/>
  
  <!-- Outer ring -->
  <circle cx="120" cy="140" r="115" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
  
  <!-- Inner circle -->
  <circle cx="120" cy="140" r="108" fill="url(#innerGrad)" stroke="#e0e6ed" stroke-width="1"/>
  
  <!-- Checkmark circle -->
  <circle cx="120" cy="120" r="38" fill="#0066b3" opacity="0.08"/>
  
  <!-- Checkmark -->
  <polyline points="100,118 114,132 140,106" fill="none" stroke="#0066b3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- ISO text -->
  <text x="120" y="185" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a202c" letter-spacing="4">ISO</text>
  
  <!-- 9001:2015 -->
  <text x="120" y="212" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#0066b3" letter-spacing="1">9001:2015</text>
  
  <!-- Divider -->
  <line x1="60" y1="226" x2="180" y2="226" stroke="#cbd5e0" stroke-width="1"/>
  
  <!-- CERTIFIED -->
  <text x="120" y="245" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#4a5568" letter-spacing="3">CERTIFIED</text>
  
  <!-- Quality Management -->
  <text x="120" y="262" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="400" fill="#718096" letter-spacing="1.5">QUALITY MANAGEMENT SYSTEM</text>
</svg>
